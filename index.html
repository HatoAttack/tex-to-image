<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeX 数式 to 画像</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
        },
        svg: {
          fontCache: 'none',
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>TeX 数式を画像として出力</h1>
      <p class="description">入力した TeX 数式をリアルタイムにプレビューし、PNG・SVG 画像として保存できます。</p>

      <div class="layout">
        <!-- 左カラム: 入力 -->
        <div class="input-column">
          <section class="panel">
            <label for="texInput">TeX 入力欄</label>
            <textarea id="texInput" rows="6" spellcheck="false">\\int_0^1 x^2 \\, dx = \\frac{1}{3}</textarea>
            <div class="example-buttons" role="group" aria-labelledby="examples-label">
              <span id="examples-label" class="sr-only">数式の例</span>
              <button class="example-btn" data-example="\\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}">2次方程式</button>
              <button class="example-btn" data-example="e^{i\\pi} + 1 = 0">オイラーの等式</button>
              <button class="example-btn" data-example="\\sum_{n=1}^{\\infty} \\frac{1}{n^2} = \\frac{\\pi^2}{6}">無限級数</button>
            </div>
          </section>
        </div>

        <!-- 右カラム: プレビュー + 保存 -->
        <div class="output-panel">
          <section class="panel">
            <h2>プレビュー（リアルタイム反映）</h2>
            <div id="preview" class="preview">
              <div id="mathOutput" class="math-output" aria-live="polite"></div>
            </div>
            <p id="error" class="error" hidden></p>
          </section>

          <div class="save-buttons">
            <button id="savePngBtn" class="save-btn">PNG として保存</button>
            <button id="saveSvgBtn" class="save-btn svg">SVG として保存</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
